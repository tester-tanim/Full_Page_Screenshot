<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FullSnap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">
      <!-- Camera + layers icon -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="7" width="20" height="14" rx="2" fill="white" fill-opacity="0.15" stroke="white"
          stroke-width="1.5" />
        <circle cx="12" cy="14" r="3.5" stroke="white" stroke-width="1.5" />
        <path d="M8 7V6a2 2 0 012-2h4a2 2 0 012 2v1" stroke="white" stroke-width="1.5" stroke-linecap="round" />
        <line x1="17" y1="11" x2="19" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round" />
      </svg>
    </div>
    <div class="header-text">
      <h1>FullSnap</h1>
      <p>Full-page screenshot capture</p>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="content">

    <!-- Capture Button -->
    <button class="btn-capture" id="btnCapture">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="6" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.8" />
        <circle cx="12" cy="12.5" r="3" stroke="currentColor" stroke-width="1.8" />
        <path d="M9 6V5a2 2 0 012-2h2a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </svg>
      Capture Full Page
    </button>

    <!-- Options -->
    <div class="options-panel">
      <!-- Format -->
      <div class="option-row">
        <span class="option-label">Format</span>
        <div class="format-toggle">
          <button class="format-btn active" data-fmt="png">PNG</button>
          <button class="format-btn" data-fmt="jpeg">JPEG</button>
        </div>
      </div>
      <!-- Copy to clipboard -->
      <div class="option-row">
        <span class="option-label">Copy to clipboard</span>
        <label class="toggle">
          <input type="checkbox" id="chkClipboard" />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <!-- Progress (hidden until capture starts) -->
    <div class="progress-section" id="progressSection">
      <div class="progress-header">
        <span class="progress-label" id="progressLabel">Preparing…</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Preview (hidden until capture completes) -->
    <div class="preview-section" id="previewSection">
      <div class="preview-header">
        <span class="preview-title">Preview</span>
        <div class="preview-actions">
          <button class="btn-small" id="btnDownload">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Save
          </button>
          <button class="btn-small" id="btnCopyImg">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.6" />
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" />
            </svg>
            Copy
          </button>
        </div>
      </div>
      <div class="preview-img-wrap">
        <img id="previewImg" src="" alt="Screenshot preview" />
      </div>
    </div>

    <!-- Status message -->
    <p class="status-msg" id="statusMsg"></p>

    <!-- Keyboard shortcut hint -->
    <p class="shortcut-hint">
      Press <kbd>Ctrl+Shift+S</kbd> to capture anytime
    </p>

  </main>

  <script src="popup.js"></script>
</body>

</html>
